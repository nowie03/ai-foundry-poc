name: Test and Deploy Agent (dev)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  PROMPTFOO_VERSION: "0.121.18"
  AZURE_ACCESS_TOKEN: ${{ secrets.AZURE_ACCESS_TOKEN }}
  AZURE_FOUNDRY_ENDPOINT: ${{ vars.AZURE_FOUNDRY_ENDPOINT }}
  AZURE_CHAT_MODEL_DEPLOYMENT: ${{ vars.AZURE_CHAT_MODEL_DEPLOYMENT }}
  AZURE_EMBEDDING_MODEL_DEPLOYMENT: ${{ vars.AZURE_EMBEDDING_MODEL_DEPLOYMENT }}
  AGENT_NAME: ${{ vars.AGENT_NAME }}
  TOOLBOX_NAME: ${{ vars.TOOLBOX_NAME }}
  MCP_CONNECTIONS: ${{ vars.MCP_CONNECTIONS }}
  ENABLE_LOCAL_TOOLS: "false"
  # Promptfoo's llm-rubric grading provider: prefers Azure OpenAI over OPENAI_API_KEY
  # when these are set (see getDefaultProviderPreferences in promptfoo's source).
  AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
  AZURE_API_HOST: ${{ vars.AZURE_API_HOST }}
  AZURE_DEPLOYMENT_NAME: ${{ vars.AZURE_DEPLOYMENT_NAME }}
  AZURE_OPENAI_DEPLOYMENT_NAME: ${{ vars.AZURE_OPENAI_DEPLOYMENT_NAME }}
  AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME: ${{ vars.AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME }}

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Deploy skills, toolbox, and agent (new version)
        run: |
          python scripts/sync_skills.py
          python scripts/deploy_toolbox.py
          python scripts/deploy_agent.py

      - name: Smoke test (must be 100% — fastest signal, gates everything else)
        run: |
          mkdir -p results
          npx --yes promptfoo@${{ env.PROMPTFOO_VERSION }} eval \
            -c tests/promptfoo.yaml -c tests/suites/smoke.yaml \
            -o results/smoke.json || true
          python scripts/check_eval_results.py results/smoke.json --min-pass-rate 1.0

      - name: Skills suite (>= 80%)
        run: |
          npx --yes promptfoo@${{ env.PROMPTFOO_VERSION }} eval \
            -c tests/promptfoo.yaml -c tests/suites/skills.yaml \
            -o results/skills.json || true
          python scripts/check_eval_results.py results/skills.json --min-pass-rate 0.8

      - name: Tool use suite (>= 80% — local-tools disabled in CI, one test expected to miss)
        run: |
          npx --yes promptfoo@${{ env.PROMPTFOO_VERSION }} eval \
            -c tests/promptfoo.yaml -c tests/suites/tool_use.yaml \
            -o results/tool_use.json || true
          python scripts/check_eval_results.py results/tool_use.json --min-pass-rate 0.8

      - name: Multi-turn suite (>= 80%)
        run: |
          npx --yes promptfoo@${{ env.PROMPTFOO_VERSION }} eval \
            -c tests/promptfoo.yaml -c tests/suites/multi_turn.yaml \
            -o results/multi_turn.json || true
          python scripts/check_eval_results.py results/multi_turn.json --min-pass-rate 0.8

      - name: Roll back on failure (delete the bad agent version)
        if: failure()
        run: python scripts/delete_agent.py

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: results/*.json
          if-no-files-found: ignore

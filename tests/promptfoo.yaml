# Promptfoo root configuration — shared settings (env, timeout, concurrency, output path).
# promptfoo has no config-level "import" field, so combining this with the suite files
# happens at the CLI via multiple -c flags — promptfoo's combineConfigs() merges
# providers/prompts/tests/defaultTest/env/outputPath across all configs passed this way.
#
# Usage:
#   npx promptfoo eval -c tests/promptfoo.yaml \
#     -c tests/suites/smoke.yaml -c tests/suites/skills.yaml \
#     -c tests/suites/tool_use.yaml -c tests/suites/multi_turn.yaml
#   npx promptfoo view                          # open results in browser
#
# Red team is a separate command (it has its own config):
#   npx promptfoo redteam run -c tests/suites/redteam.yaml

description: "Foundry Harness Agent — Full Eval"

# No PROMPTFOO_PYTHON override here — promptfoo's config `env:` block takes
# precedence over real process env vars for the same key, so a hardcoded path
# here would break every other machine (including CI runners). If you need a
# non-default interpreter, set PROMPTFOO_PYTHON in your own shell profile.

providers:
  - id: "python:provider.py"
    label: "foundry-agent"

# Pass-through prompt — each suite's test vars supply the actual message.
prompts:
  - "{{message}}"

defaultTest:
  options:
    timeout: 90000        # 90 s default; individual suites can override

# Disable parallelism so multi-turn session ordering is deterministic.
# Raise to ~3 for faster smoke/skills runs once multi-turn is proven stable.
maxConcurrency: 1

# Write results to a file for CI consumption
outputPath: results/latest.json
